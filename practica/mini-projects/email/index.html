<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <link rel="stylesheet" href="styles.css" />
        <script src="https://cdn.tailwindcss.com"></script>
        <title>Email Subscribe</title>
    </head>
    <body>
        <!-- Background container -->
        <div class="flex items-center justify-center h-screen bg-zinc-700">
            <!-- Card -->
            <div class="bg-zinc-800 p-2 mx-6 rounded-2xl">
                <!-- Flex container -->
                <div class="flex flex-col md:flex-row rounded-l-xl">
                    <img src="imagenes/image.jpg" alt="imagen_izqueirda" 
                        class="object-fit rounded-xl h-80 md:h-64 md:rounded-l-xl 
                        md:rounded-r-none transform hover:scale-105 hover:rounded-xl
                        duration-200 float-left"/>

                        <!-- Content -->
                        <div class="p-6 md:p-12">
                            <h2 class="font-serif text-xl font-medium text-center text-white
                                        md:text-left">
                                        Get diet and fitness tips in your inbox
                            </h2>

                            <p class="max-w-ws my-4 text-xs leading-5 tracking-wide text-center text-white md:text-left">
                                    Eat better and exercise better. <br>
                                    Sign up for the Diet&fitness newsletter.
                            </p>

                            <!-- Hacemos el div y dentro los dos -->
                            <div class="flex flex-col mt-5 space-y-4 md:space-x-3 md:flex-row 
                                        md:space-y-0">

                                        <!-- Enter email -->
                                        <input type="text" placeholder="Enter your email address"
                                                class="bg-transparent border border-zinc-600 border-2 px-4 p-2
                                                        items-center justify-center md:items-center text-white hover:text-white 
                                                        placeholder:text-xs placeholder:text-center flex-1 w-full 
                                                        md:w-auto md:flex-1 md:text-left placeholder:md:text-left 
                                                        focus:outline-none rounded-md">

                                        <!-- Submit -->
                                        <button class="px-5 py-3 text-xs rounded-md text-xinc-800
                                                        bg-lime-500 hover:bg-lime-700 hover:text-white">
                                                        Submit
                                        </button>
                            </div>
                        </div>
                </div>
            </div>
        </div>
    </body>
</html>
