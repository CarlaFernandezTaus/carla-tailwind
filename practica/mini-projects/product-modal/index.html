<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Product modal </title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>

    <body>
        <!-- Global container -->
        <div class="flex items-center justify-center min-h-screen bg-slate-100">
            <!-- Card Container -->
            <div class="flex flex-col p-6 m-3 space-y-10 bg-white rounded-2xl shadow-2xl md:flex-row md:space-y-0 md:space-x-10 md:m-0 md:p-16">
                <!-- Image -->
                <div>
                    <img src="imagenes/headphones.webp" alt="headphone" class="mx-auto hover:scale-105 duration-200 w-60">
                </div>

                <!-- Content - text -->
                <div class="flex flex-col space-y-6">
                    <!-- Label and Title Container -->
                    <div class="flex flex-col mb-4 space-y-3 text-center md:text-left">
                        <!-- free shoping -->
                        <div>
                            <div class="inline-block bg-black text-white text-sm px-3 py-1 rounded-full">
                                Free shipping
                            </div>
                        </div>
                        <!-- Title -->
                        <div class=" max-w-sm text-2xl font-medium"> Buy AirPods Max - Blue </div>
                        <!-- Price -->
                        <div class="flex flex-col mb-4 space-y-3 text-center md:text-left">
                            <p class="line-through">$779</p>
                            <p class="text-5xl font-bold">$579</p>
                            <p class="text-sm font-light text-gray-400">
                                This offer is valid until April 3 or as long as stock lasts!
                            </p>
                        </div>

                        <!-- Button Group -->
                        <div class="group">
                            <button class="w-full bg-blue-700 text-white border-b-8 border-b-blue-700 rounded-lg 
                                            group-hover:border-t-8 group-hover:border-b-0 group-hover:bg-blue-700
                                            group-hover: border-t-blue-700 group-hover:shadow-lg transition-all duration-150">
                                <div class="px-8 py-4 bg-blue-500 rounded-lg group-hover:bg-blue-700
                                            duration-150">Add to cart
                                </div>
                            </button>
                        </div>

                        <!-- Stock -->
                        <div class="flex items-center space-x-3 group">
                            <!-- Circulo verde -->
                            <div class="w-3 h-3 bg-green-400 rounded-full group-hover-animate-ping"></div>
                            <!--Texto-->
                            <div class="text-sm">50+ pcs. in stock</div>
                        </div>

                        <!-- Bottom buttons Container -->
                        <div class="flex flex-col space-y-4 md:space-y-0 md:space-x-4 md:flex-row">
                            <button class="flex items-center justify-center py-3 px-5 space-x-3 border-2 border-gray-300 
                                            rounded-lg shadow-sm hover:bg-opacity-30 hover:shadow-lg hover:-translate-y-0.5 
                                            transition-all duration-150">
                                <img src="imagenes/weight.png" alt="" class="w-8">
                                <span> Add to card</span>
                            </button>

                            <button class="flex items-center justify-center py-3 px-5 space-x-3 border-2 border-gray-300
                                            rounded-lg shadow-sm hover:bg-opacity-30 hover:shadow-xl hover:-translate-y-0.5
                                            transition-all duration-150">
                                <img src="imagenes/heart.png" alt="" class="w-6">
                                <span> Add to wishlist</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
